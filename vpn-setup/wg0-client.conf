[Interface]
# IP Address ของ VPN Client ในท่อ WireGuard สำหรับ Pi 4
Address = 10.0.0.2/24

# Private Key ของ Pi 4 Client (สร้างโดย: wg genkey)
PrivateKey = <PI_Z2W_CLIENT_PRIVATE_KEY>

# -----------------------------------------------------------------------------
# PEER DEFINITIONS (บอร์ดเซิร์ฟเวอร์ส่วนกลาง)
# -----------------------------------------------------------------------------

# Peer: Raspberry Pi 4 (VPN Server / Central Hub)
[Peer]
# Public Key ของ VPN Server (นำมาจากฝั่ง Pi 4)
PublicKey = <PI_4_SERVER_PUBLIC_KEY>

# Endpoint คือ IP จริงสาธารณะของเราเตอร์ฝั่งสำนักงานใหญ่ หรือ DDNS และพอร์ตที่ Forward ไว้
Endpoint = <PUBLIC_IP_OR_DDNS_OF_PI_4>:51820

# ช่วง IP วงที่อนุญาตให้ข้อมูลวิ่งผ่านช่องทางนี้ (เราท์ติ้งไปท่อ VPN)
# 10.0.0.0/24 หมายความว่าแพ็คเก็ตใดๆ ที่ส่งไปหา 10.0.0.* จะถูกส่งผ่านท่อ VPN ทั้งหมด
AllowedIPs = 10.0.0.0/24

# PersistentKeepalive: ปล่อยแพ็คเก็ต Keepalive ทุกๆ 25 วินาที
# เพื่อรักษาความปลอดภัยและการทำงานที่คงที่ ทะลวง NAT/Firewall ของเราเตอร์ในสาขาโรงแรมให้อยู่ในสถานะ Active ตลอดเวลา
PersistentKeepalive = 25
