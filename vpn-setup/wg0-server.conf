[Interface]
# IP Address ของ VPN Server ในท่อ WireGuard (ต้องระบุ CIDR subnet)
Address = 10.0.0.1/24

# พอร์ต UDP ที่เซิร์ฟเวอร์จะคอยรอการเชื่อมต่อขาเข้า (Listen Port)
# ต้องตั้งค่า Port Forwarding บนเราเตอร์ชี้มาที่พอร์ตนี้และ IP ภายในของ Pi 4
ListenPort = 51820

# Private Key ของ VPN Server (สร้างโดย: wg genkey)
PrivateKey = <PI_4_SERVER_PRIVATE_KEY>

# คำสั่งสำหรับจัดการ IPTables เพื่อทำ IP Forwarding และ NAT ให้ Client ออกอินเทอร์เน็ตผ่าน Server ได้
# (กรณีที่ต้องการให้ Client ใช้งาน LAN ท้องถิ่น หรือข้ามเครือข่ายย่อยที่ Pi 4 เชื่อมต่ออยู่)
# หมายเหตุ: 'eth0' คืออินเทอร์เฟซหลักที่ออกอินเทอร์เน็ตของ Pi 4 (หากใช้ Wi-Fi ให้เปลี่ยนเป็น wlan0)
PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# -----------------------------------------------------------------------------
# PEER DEFINITIONS (บอร์ดลูกข่ายปลายทาง)
# -----------------------------------------------------------------------------

# Peer: Raspberry Pi 4 (Hotel Spoke Node #1)
[Peer]
# Public Key ของ Pi 4 (สร้างโดย: wg pubkey)
PublicKey = <PI_Z2W_CLIENT_PUBLIC_KEY>

# IP Address ที่อนุญาตให้ใช้และจะทำการเราท์ติ้งไปหา Peer ตัวนี้ในวง VPN (/32 คือเจาะจงเครื่องเดี่ยว)
AllowedIPs = 10.0.0.2/32
